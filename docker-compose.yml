version: '3.8'

services:
  voice-chat-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: voice-chat-service
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs
    networks:
      - voice-chat-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  voice-chat-network:
    driver: bridge

volumes:
  logs:

